<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoo Apps — Documentation Hub</title>
  <meta name="description" content="Explore Odoo custom module documentation, tutorials and vlogs by Sreeram." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─────────────────────────────────── */
    :root {
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --radius: 18px;
      --card-w: 320px;
      --transition: 0.35s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg: #0d0d14;
      --bg2: #13131f;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0ff;
      --text-muted: #8888aa;
      --shadow: 0 8px 40px rgba(0,0,0,0.6);
      --glow: rgba(124,58,237,0.35);
      --tag-bg: rgba(124,58,237,0.18);
      --tag-text: #c4b5fd;
      --badge-bg: rgba(6,182,212,0.15);
      --badge-text: #67e8f9;
    }
    [data-theme="light"] {
      --bg: #f4f4fc;
      --bg2: #eaeaf5;
      --surface: #ffffff;
      --surface-hover: #f0eeff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --text-muted: #6b6b8a;
      --shadow: 0 8px 40px rgba(100,80,200,0.12);
      --glow: rgba(124,58,237,0.15);
      --tag-bg: rgba(124,58,237,0.1);
      --tag-text: #6d28d9;
      --badge-bg: rgba(6,182,212,0.1);
      --badge-text: #0891b2;
    }

    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Animated background orbs ──────────────────────── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-orbs span {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .bg-orbs span:nth-child(1) { width:500px;height:500px;background:var(--accent);top:-100px;left:-100px;animation-duration:20s; }
    .bg-orbs span:nth-child(2) { width:400px;height:400px;background:var(--accent2);bottom:-120px;right:-80px;animation-duration:25s; }
    .bg-orbs span:nth-child(3) { width:300px;height:300px;background:#ec4899;top:40%;left:55%;animation-duration:22s; }
    @keyframes drift { from{transform:translate(0,0) scale(1);} to{transform:translate(40px,30px) scale(1.1);} }

    /* ─── Layout ─────────────────────────────────────────── */
    .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

    /* ─── Header ─────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 0;
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 0 20px var(--glow);
    }
    .logo-text { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text span { color: var(--accent2); }

    /* ─── Theme Toggle ───────────────────────────────────── */
    #theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      font-size: 0.85rem; font-weight: 500; color: var(--text);
      transition: all var(--transition);
    }
    #theme-toggle:hover { background: var(--surface-hover); box-shadow: 0 0 14px var(--glow); }
    #theme-toggle .icon { font-size: 1rem; transition: transform 0.5s; }
    #theme-toggle:hover .icon { transform: rotate(20deg); }

    /* ─── Hero ───────────────────────────────────────────── */
    .hero { text-align: center; padding: 72px 0 56px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--badge-bg); color: var(--badge-text);
      border: 1px solid rgba(6,182,212,0.2);
      border-radius: 50px; padding: 5px 14px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 22px;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 800; letter-spacing: -1.5px; line-height: 1.1;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 18px;
    }
    .hero p {
      font-size: 1.1rem; color: var(--text-muted); max-width: 560px;
      margin: 0 auto 32px; line-height: 1.7;
    }
    .hero-stats {
      display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--accent2); }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ─── Search & Filter ────────────────────────────────── */
    .controls {
      display: flex; gap: 12px; align-items: center;
      flex-wrap: wrap; margin-bottom: 40px;
    }
    .search-wrap {
      flex: 1; min-width: 220px; position: relative;
    }
    .search-wrap::before {
      content: '🔍'; position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 0.9rem; pointer-events: none;
    }
    #search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px 12px 40px;
      color: var(--text); font-size: 0.95rem; font-family: inherit;
      transition: all var(--transition); outline: none;
    }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    #search::placeholder { color: var(--text-muted); }

    .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); font-family: inherit;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 0 16px var(--glow);
    }

    /* ─── Cards Grid ─────────────────────────────────────── */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
      gap: 24px;
    }

    /* ─── App Card ───────────────────────────────────────── */
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 26px 22px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column; gap: 14px;
      transition: all var(--transition);
      position: relative; overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .app-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0; transition: opacity var(--transition);
      border-radius: var(--radius);
    }
    .app-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow), 0 0 30px var(--glow);
      border-color: var(--accent);
    }
    .app-card:hover::before { opacity: 0.06; }
    .app-card > * { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-icon {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .card-meta { display: flex; flex-direction: column; gap: 4px; }
    .card-version {
      font-size: 0.72rem; font-weight: 600; color: var(--badge-text);
      background: var(--badge-bg); border-radius: 6px; padding: 2px 8px;
      display: inline-block; letter-spacing: 0.3px;
    }
    .card-date { font-size: 0.72rem; color: var(--text-muted); }

    .card-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; line-height: 1.3; }
    .card-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; flex: 1; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 0.73rem; font-weight: 600; background: var(--tag-bg);
      color: var(--tag-text); border-radius: 6px; padding: 3px 9px;
      letter-spacing: 0.2px;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px;
    }
    .card-link-label {
      font-size: 0.82rem; font-weight: 600; color: var(--accent2);
      display: flex; align-items: center; gap: 5px; transition: gap var(--transition);
    }
    .app-card:hover .card-link-label { gap: 10px; }
    .card-type-badge {
      font-size: 0.7rem; padding: 3px 9px; border-radius: 6px; font-weight: 600;
    }
    .type-pos    { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .type-sale   { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .type-stock  { background: rgba(251,146,60,0.15); color: #fb923c; }
    .type-hr     { background: rgba(236,72,153,0.15); color: #f472b6; }
    .type-custom { background: rgba(6,182,212,0.15);  color: #67e8f9; }

    /* ─── Empty State ────────────────────────────────────── */
    #empty-state {
      display: none; text-align: center; padding: 80px 20px; color: var(--text-muted);
    }
    #empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    #empty-state p { font-size: 1rem; }

    /* ─── Footer ─────────────────────────────────────────── */
    footer {
      text-align: center; padding: 40px 0 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.82rem;
    }
    footer a { color: var(--accent2); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ─── Responsive ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .hero { padding: 48px 0 36px; }
      .hero-stats { gap: 24px; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-orbs">
    <span></span><span></span><span></span>
  </div>

  <div class="wrapper">

    <!-- ── Header ── -->
    <header>
      <div class="logo">
        <div class="logo-icon">🐙</div>
        <span class="logo-text">Odoo<span>Docs</span></span>
      </div>
      <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="icon" id="theme-icon">🌙</span>
        <span id="theme-label">Dark Mode</span>
      </button>
    </header>

    <!-- ── Hero ── -->
    <section class="hero">
      <div class="hero-badge">✦ Custom Modules</div>
      <h1>My Odoo Apps Documentation Hub</h1>
      <p>Detailed guides, walkthroughs and vlogs for every custom Odoo module — browse, learn and build.</p>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Modules</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-pos">0</div>
          <div class="stat-label">POS Apps</div>
        </div>
      </div>
    </section>

    <!-- ── Controls ── -->
    <div class="controls">
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search modules…" oninput="filterCards()" />
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('pos',this)">POS</button>
        <button class="filter-btn" onclick="setFilter('stock',this)">Stock</button>
        <button class="filter-btn" onclick="setFilter('sale',this)">Sales</button>
        <button class="filter-btn" onclick="setFilter('custom',this)">Custom</button>
      </div>
    </div>

    <!-- ── Cards Grid ── -->
    <div id="cards-grid"></div>
    <div id="empty-state">
      <div class="empty-icon">🔍</div>
      <p>No modules match your search.</p>
    </div>

    <!-- ── Footer ── -->
    <footer>
      <p>Built with ❤️ · Odoo Docs Hub · <a href="mailto:you@example.com">Contact</a></p>
    </footer>

  </div>

  <script>
    /* ═══════════════════════════════════════════════════════
     *  ✦  ADD YOUR APPS HERE
     *  Just add a new object to this array.
     *  Set `file` to the HTML filename you create (e.g. "pos_dashboard.html")
     * ═══════════════════════════════════════════════════════ */
    const APPS = [
      {
        title: "POS Dashboard",
        description: "Advanced analytics dashboard for Point of Sale — KPIs, top products, session summaries and multi-currency support.",
        file: "pos_dashboard.html",
        icon: "📊",
        iconBg: "linear-gradient(135deg,#7c3aed,#06b6d4)",
        tags: ["Dashboard", "KPI", "Analytics"],
        type: "pos",
        version: "v18.0",
        date: "May 2026"
      },
      {
        title: "POS Auto Replenishment",
        description: "Automatically triggers internal stock transfers from the main warehouse to POS locations when inventory drops below minimums.",
        file: "pos_auto_replenishment.html",
        icon: "🔄",
        iconBg: "linear-gradient(135deg,#059669,#10b981)",
        tags: ["Stock", "Automation", "Replenishment"],
        type: "pos",
        version: "v18.0",
        date: "May 2026"
      },
      {
        title: "Multi UOM POS",
        description: "Enables selling products in multiple units of measure directly from POS, with barcode scanning support per UOM.",
        file: "product_multi_uom_pos.html",
        icon: "📦",
        iconBg: "linear-gradient(135deg,#d97706,#f59e0b)",
        tags: ["UOM", "Barcode", "POS"],
        type: "pos",
        version: "v18.0",
        date: "Apr 2026"
      },
      {
        title: "Multi Currency POS",
        description: "Accept payments in multiple currencies at POS with live exchange rates displayed on the closing register.",
        file: "multi_currency_payment_in_pos.html",
        icon: "💱",
        iconBg: "linear-gradient(135deg,#0891b2,#06b6d4)",
        tags: ["Currency", "Payment", "POS"],
        type: "pos",
        version: "v18.0",
        date: "May 2026"
      },
      {
        title: "ZPL Label Print",
        description: "Print ZPL product labels on Zebra printers with full Arabic text reshaping and RTL bidi support.",
        file: "psae_zpl_print.html",
        icon: "🏷️",
        iconBg: "linear-gradient(135deg,#be185d,#ec4899)",
        tags: ["ZPL", "Print", "Arabic"],
        type: "stock",
        version: "v18.0",
        date: "May 2026"
      },
      {
        title: "User Deletion API",
        description: "Secure REST API controller for customer/partner account deletion with OTP-based mobile verification flow.",
        file: "sr_user_deletion.html",
        icon: "🔐",
        iconBg: "linear-gradient(135deg,#dc2626,#ef4444)",
        tags: ["API", "Security", "Portal"],
        type: "custom",
        version: "v18.0",
        date: "May 2026"
      }
    ];
    /* ════════════════════════════════════════════════════════ */

    let activeFilter = 'all';

    /* ── Render Cards ── */
    function renderCards(list) {
      const grid = document.getElementById('cards-grid');
      const empty = document.getElementById('empty-state');
      grid.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach((app, i) => {
        const delay = i * 60;
        const typeClass = 'type-' + (app.type || 'custom');
        const typeLabel = (app.type || 'custom').toUpperCase();
        grid.innerHTML += `
          <a class="app-card" href="${app.file}" style="animation-delay:${delay}ms">
            <div class="card-header">
              <div class="card-icon" style="background:${app.iconBg}">${app.icon}</div>
              <div class="card-meta">
                <span class="card-version">${app.version}</span>
                <span class="card-date">${app.date}</span>
              </div>
            </div>
            <div class="card-title">${app.title}</div>
            <div class="card-desc">${app.description}</div>
            <div class="card-tags">${app.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <div class="card-footer">
              <span class="card-link-label">Read Docs →</span>
              <span class="card-type-badge ${typeClass}">${typeLabel}</span>
            </div>
          </a>`;
      });
    }

    /* ── Filter Logic ── */
    function filterCards() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = APPS.filter(a => {
        const matchType = activeFilter === 'all' || a.type === activeFilter;
        const matchSearch = !q || a.title.toLowerCase().includes(q)
          || a.description.toLowerCase().includes(q)
          || a.tags.some(t => t.toLowerCase().includes(q));
        return matchType && matchSearch;
      });
      renderCards(filtered);
    }

    function setFilter(type, btn) {
      activeFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterCards();
    }

    /* ── Stats ── */
    function updateStats() {
      document.getElementById('stat-total').textContent = APPS.length;
      document.getElementById('stat-pos').textContent = APPS.filter(a=>a.type==='pos').length;
    }

    /* ── Theme Toggle ── */
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-icon').textContent  = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    /* ── Init ── */
    (function init() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-icon').textContent  = saved === 'dark' ? '🌙' : '☀️';
      document.getElementById('theme-label').textContent = saved === 'dark' ? 'Dark Mode' : 'Light Mode';
      updateStats();
      filterCards();
    })();
  </script>
</body>
</html>
